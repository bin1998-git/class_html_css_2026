<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      p {
        color: black;
      }

      #temp-01 {
        color: blue;
        font-size: 19px;
        font-weight: bolder;
      }

      .temp-02 {
        color: green;
        font-size: x-large;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h2>CSS 선택자란</h2>
    <p>여기는 첫번째 P태그야</p>
    <p id="temp-01">여기는 두번째 P태그야</p>
    <p class="temp-02">여기는 세번째 P태그야</p>
    <p class="temp-02">여기는 네번째 P태그야</p>
  </body>
</html>
