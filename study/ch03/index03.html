<html lang="en">
  <head>

    <title>Document</title>
    <style>
      * {
        margin: 0px;

        height: 60px;
        background-color: #1e293c;

      .card {
        width: calc(33.333% - 7px);

        margin-left: 3.5px;
        margin-right: 3.5px;
      }
    </style>
  </head>
  <body>
    <header class="header">헤더(60px 고정)</header>
    <main class="main">
      <div class="card">clac(33.3333% -7px)</div>

    </main>
  </body>
</html>
