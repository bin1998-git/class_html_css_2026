<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .a1 {
        font-size: 16px;
        padding: 10px;
        background-color: blue;
        color: white;
      }
      .a2 {
        width: 100%;
        background-color: purple;
        padding: 10px;
        color: white;
      }
      .a3 {
        height: 50vh;
        background-color: green;
        padding: 10px;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="a1">width: 300px(고정! 창줄여도 안 변함)</div>
    <div class="a2">width: 50% (창 줄이면 같이 줄어듦)</div>
    <div class="a3">height: 30vh(화면 높이의 30%)</div>
  </body>
</html>
