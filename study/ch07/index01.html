<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    \
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!--  패턴 6 스티키 푸터
      content-wrapper가 남은 공간을 전부 차지 ->
       footer를 맨 아래로 밀어냄  
    -->
    <div class="content-wrapper">
      <!-- 패턴1 가운데 정렬 -->
      <section class="header">
        <button class="btn-header">패턴1: 완전 가운데</button>
      </section>

      <!-- 패턴2 네비게이션 바 -->
      <nav class="logo-back">
        <span>Logo</span>
        <div>
          <a href="" class="menu">메뉴 1</a>
          <a href="" class="menu">메뉴 2</a>
          <a href="" class="menu">메뉴 3</a>
        </div>
      </nav>

      <!-- 패턴 3 카드 그리드 -->
      <section class="cards">
        <div>
          <span class="card">카드 1</span>
          <span class="card">카드 2</span>
          <span class="card">카드 3</span>
          <span class="card">카드 4</span>
        </div>
      </section>

      <!-- 패턴4 사이드바 + 메인 -->
      <div class="layout">
        <div class="sidebar">사이드바</div>
        <main class="main">메인 콘텐츠</main>
      </div>

      <!-- 패턴 5 히어로 섹션 -->
      <section class="hero">
        <h2 class="hero-section">히어로 섹션</h2>
      </section>

      <!-- 패턴7 반응형 2단 -- 1단 -->
      <div class="left-right">
        <div class="left">왼쪽</div>
        <div class="right">오른쪽</div>
      </div>
    </div>

    <!-- footer는 content-wrapper 밖에 있어야 맨 아래 고정 됨 -->
    <footer>2026 CSS Layout Patterns.</footer>
  </body>
</html>
