<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        border: 2px solid green;
        padding: 20px;
      }

      .item {
        width: 100px;
        height: 100px;
        background-color: yellow;
        margin: 10px;
        border: 2px solid black;
        border-radius: 10px;
        text-align: center;
        justify-content: center;
        line-height: 100px;
        flex-grow: 1;
      }
      .item2 {
        flex-grow: 2;
      }
      .item3 {
        flex-grow: 5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">1</div>
      <div class="item">1</div>
      <div class="item">1</div>
      <div class="item item2">2</div>
      <div class="item item3">5</div>
    </div>
  </body>
</html>
