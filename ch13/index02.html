<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        flex-direction: row;
        border: 2px solid #9fc7b3;
        padding: 10px;
      }

      .item {
        width: 100px;
        height: 100px;
        background-color: #32cd32;
        margin: 5px;
        border: 2px solid brown;
        text-align: center;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 8px;
      }

      .container.columm {
        flex-direction: column;
      }

      .container.row-reverse {
        flex-direction: row-reverse;
      }
    </style>
  </head>
  <body>
    <h3>flex-direction : row</h3>
    <div>
      <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
      </div>
    </div>
    <h3>flex-direction : columm</h3>
    <div>
      <div class="container columm">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
      </div>
    </div>
    <h3>flex-direction : row-reverse</h3>
    <div>
      <div class="container row-reverse">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
      </div>
    </div>
  </body>
</html>
